<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <style>
      .logo-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: white; }
    </style>
  </defs>
  <!-- Icon: stacked chevrons with checkmark -->
  <g transform="translate(10, 8) scale(0.85)">
    <!-- Bottom chevron -->
    <path d="M10 85 L50 65 L90 85 L50 95 Z" fill="white" opacity="0.5"/>
    <!-- Middle chevron -->
    <path d="M10 70 L50 50 L90 70 L50 80 Z" fill="white" opacity="0.7"/>
    <!-- Top chevron -->
    <path d="M10 55 L50 35 L90 55 L50 65 Z" fill="white" opacity="0.9"/>
    <!-- Top surface -->
    <path d="M10 40 L50 20 L90 40 L50 50 Z" fill="white"/>
    <!-- Checkmark arrow -->
    <path d="M35 42 L48 55 L72 25" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  <!-- Text: Marçal -->
  <text x="105" y="62" class="logo-text" font-size="52" font-weight="700" letter-spacing="-1">Mar</text>
  <text x="222" y="62" class="logo-text" font-size="52" font-weight="700" letter-spacing="-1">&#231;al</text>
  <!-- Text: CONTABILIDADE -->
  <text x="107" y="85" class="logo-text" font-size="18" font-weight="400" letter-spacing="5">CONTABILIDADE</text>
</svg>
