version: "3.9"

# ============================================================
# Evolution API - Stack para rodar local ou em qualquer VPS
# ============================================================
# No Railway você NÃO precisa desse arquivo (usa o template deles).
# Este compose serve pra:
#   1. Testar local antes de subir
#   2. Rodar em VPS/Contabo/Hetzner se quiser sair do Railway
#   3. Documentar a infra completa
# ============================================================

services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: ana-marcal-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      # ---- Servidor ----
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}

      # ---- Autenticação ----
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY:-troque-essa-chave-super-secreta}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ---- Banco (Postgres) ----
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: ana_marcal
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # ---- Cache (Redis) ----
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: ${REDIS_URL}
      CACHE_REDIS_PREFIX_KEY: ana_marcal
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"

      # ---- Webhook global apontando pro backend Render ----
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_APPLICATION_STARTUP: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_SET: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_CONTACTS_SET: "false"
      WEBHOOK_EVENTS_CONTACTS_UPSERT: "false"
      WEBHOOK_EVENTS_CONTACTS_UPDATE: "false"
      WEBHOOK_EVENTS_PRESENCE_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_SET: "false"
      WEBHOOK_EVENTS_CHATS_UPSERT: "false"
      WEBHOOK_EVENTS_CHATS_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_DELETE: "false"
      WEBHOOK_EVENTS_GROUPS_UPSERT: "true"
      WEBHOOK_EVENTS_GROUPS_UPDATE: "true"
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_CALL: "false"
      WEBHOOK_EVENTS_NEW_JWT_TOKEN: "false"

      # ---- Config Baileys ----
      CONFIG_SESSION_PHONE_CLIENT: Ana Marcal
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#175EA0"

      # ---- Limpar grupos periodicamente do cache ----
      CLEAN_STORE_CLEANING_INTERVAL: "7200"
      CLEAN_STORE_MESSAGES: "true"
      CLEAN_STORE_MESSAGE_UP: "true"
      CLEAN_STORE_CONTACTS: "true"
      CLEAN_STORE_CHATS: "true"

      # ---- Log ----
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: ana-marcal-postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troqueessasenha}
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ana-marcal-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  evolution_instances:
  evolution_store:
  postgres_data:
  redis_data:
