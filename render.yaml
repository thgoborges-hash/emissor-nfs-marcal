services:
  - type: web
    name: emissor-nfs-marcal
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /app/data/emissor.db
      - key: CERTIFICADOS_DIR
        value: /app/data/certificados
      - key: NFSE_AMBIENTE
        value: homologacao
      - key: NFSE_SIMULACAO
        value: "true"
      - key: CERT_ENCRYPTION_KEY
        generateValue: true
    disk:
      name: emissor-data
      mountPath: /app/data
      sizeGB: 1
